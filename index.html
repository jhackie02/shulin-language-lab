        const cleanWord = (word) => word.toLowerCase().replace(/[.,?!'"]/g, '').trim();

        const evaluatePronunciation = (targetSentence, recognizedText) => {
            if (!recognizedText) {
                return { 
                    score: 0, 
                    wordStatus: targetSentence.split(/\s+/).map(w => ({ word: w, correct: false })), 
                    passed: false 
                };
            }

            const targetWords = targetSentence.split(/\s+/);
            const recognizedWordsClean = recognizedText.toLowerCase().split(/\s+/).map(cleanWord);

            let errors = 0;
            const wordStatus = targetWords.map(word => {
                const cleaned = cleanWord(word);
                const isCorrect = recognizedWordsClean.includes(cleaned);
                if (!isCorrect) {
                    errors++;
                }
                return { word, correct: isCorrect };
            });

            let score = 100 - (errors * 10);
            if (score < 0) score = 0;

            return {
                score,
                wordStatus,
                passed: score >= 80,
                excellent: score >= 95
            };
        };

        // --- WAV ENCODING UTILITIES ---
        const bufferToWav = (buffer) => {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            const setUint16 = (data) => {
                view.setUint16(pos, data, true);
                pos += 2;
            };

            const setUint32 = (data) => {
                view.setUint32(pos, data, true);
                pos += 4;
            };

            // Write WAV Header
            setUint32(0x46464952);                         // "RIFF"
            setUint32(length - 8);                         // File length - 8
            setUint32(0x45564157);                         // "WAVE"

            setUint32(0x20746d66);                         // "fmt " chunk
            setUint32(16);                                 // Chunk length
            setUint16(1);                                  // Sample format (raw PCM)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan);  // Byte rate
            setUint16(numOfChan * 2);                      // Block align
            setUint16(16);                                 // Bits per sample

            setUint32(0x61746164);                         // "data" chunk
            setUint32(length - pos - 4);                   // Chunk length

            // Collect channel pointers
            for (i = 0; i < buffer.numberOfChannels; i++) {
                channels.push(buffer.getChannelData(i));
            }

            // Interleave sample channels
            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // Clamp
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF); // Scale to 16-bit signed integer
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }

            return new Blob([bufferArr], { type: "audio/wav" });
        };

        const mergeAudioBlobsToWav = async (blobs) => {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContextClass();
            const audioBuffers = [];

            for (const blob of blobs) {
                try {
                    const arrayBuffer = await blob.arrayBuffer();
                    const audioBuffer = await new Promise((resolve, reject) => {
                        audioCtx.decodeAudioData(arrayBuffer, resolve, reject);
                    });
                    audioBuffers.push(audioBuffer);
                } catch (e) {
                    console.error("Error decoding audio blob segment:", e);
                }
            }

            if (audioBuffers.length === 0) {
                audioCtx.close();
                return null;
            }

            // Stitch the buffers sequentially
            const sampleRate = audioBuffers[0].sampleRate;
            const numberOfChannels = Math.max(...audioBuffers.map(b => b.numberOfChannels));
            const totalLength = audioBuffers.reduce((acc, buf) => acc + buf.length, 0);

            const outputBuffer = audioCtx.createBuffer(numberOfChannels, totalLength, sampleRate);

            let offset = 0;
            audioBuffers.forEach(buffer => {
                for (let channel = 0; channel < numberOfChannels; channel++) {
                    const sourceChannel = channel < buffer.numberOfChannels ? channel : 0;
                    const outputData = outputBuffer.getChannelData(channel);
                    const sourceData = buffer.getChannelData(sourceChannel);
                    outputData.set(sourceData, offset);
                }
                offset += buffer.length;
            });

            audioCtx.close();
            return bufferToWav(outputBuffer);
        };

                        <h1 className="text-3xl sm:text-4xl font-bold text-yellow-300 font-sans tracking-wide leading-snug drop-shadow">

        const StudentSelection = ({ classNum, onSelectStudent, onBack }) => {

        const Dashboard = ({ student, classNum, topics, results, onExit, onPracticeSentence }) => {
            const [selectedTopicId, setSelectedTopicId] = useState(null);

            // Filter topics based on Priority rule: Student -> Class -> School
            const filteredTopics = topics.filter(topic => {
                if (topic.targetRange === 'student') {
                    const classMatch = Array.isArray(topic.targetClass)
                        ? topic.targetClass.map(String).includes(classNum.toString())
                        : topic.targetClass.toString() === classNum.toString();
                    return classMatch && topic.targetStudents.includes(student.name);
                }
                if (topic.targetRange === 'class') {

            return (

                        <div className="bg-[#1A113C] rounded-2xl p-4 flex items-center justify-between shadow-lg border border-purple-900/50 shrink-0 select-none animate-fade-in">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-xl flex items-center justify-center shadow-lg transform rotate-3 border border-yellow-300/30">
                                    <i className="fa-solid fa-hat-wizard text-2xl text-purple-900"></i>
                                </div>
                                <div>
                                    <h2 className="text-2xl font-bold text-white leading-tight font-sans">{student.name}</h2>
                                    <div className="flex items-center gap-2 mt-0.5">
                                        <span className="bg-purple-800 text-yellow-300 text-xs font-bold px-2 py-0.5 rounded">Class {classNum}A</span>
                                        <span className="text-xs text-purple-300">Select Topic to start / 請選擇主題練習</span>
                                    </div>
                                </div>
                            </div>

                            <div className="flex-grow max-w-md mx-8 hidden md:block">
                                <div className="flex justify-between text-xs text-purple-200 mb-1 font-sans">
                                    <span>Topic Mastery / 主題熟練度</span>
                                    <span className="font-bold text-yellow-300">{masteryPercent}%</span>
                                </div>
                                <div className="w-full bg-[#0a0716] rounded-full h-2.5 overflow-hidden border border-purple-950">
                                    <div className="bg-gradient-to-r from-purple-500 to-indigo-500 h-2.5 rounded-full transition-all duration-500 shadow-[0_0_10px_rgba(139,92,246,0.5)]" style={{width: `${masteryPercent}%`}}></div>
                                </div>
                            </div>

                            <button onClick={onExit} className="bg-purple-900/40 hover:bg-purple-800 text-purple-200 px-4 py-2 rounded-xl text-sm transition-colors border border-purple-700/50 flex items-center gap-2">
                                <i className="fa-solid fa-arrow-left"></i> Exit / 登出
                            </button>
                        </div>

                        <div className="flex flex-col md:flex-row gap-4 flex-grow min-h-0">
                            
                            <div className="w-full md:w-1/3 flex flex-col gap-2 min-h-0">
                                <h3 className="text-yellow-400 font-bold text-sm tracking-widest flex items-center gap-2 shrink-0 px-2 font-sans">
                                    <i className="fa-solid fa-bookmark text-xs"></i> 1. SELECT TOPIC / 選擇主題
                                </h3>
                                <div className="flex-grow overflow-y-auto space-y-3 pr-1 pb-4 custom-scrollbar">
                                    {filteredTopics.map(topic => {
                                        const isActive = topic.id === selectedTopicId;
                                        return (
                                            <button 
                                                key={topic.id}
                                                onClick={() => setSelectedTopicId(topic.id)}
                                                className={`w-full text-left p-4 rounded-xl transition-all border flex flex-col ${isActive ? 'bg-[#22174d] border-purple-500 shadow-md shadow-purple-500/10' : 'bg-magic-card border-transparent hover:bg-[#251e4d]'} active:scale-98`}
                                            >
                                                <div className="text-base font-bold text-white mb-0.5 font-sans leading-tight">{topic.name.split(' / ')[0]}</div>
                                                <div className="text-xs text-purple-300 mb-2 font-sans">{topic.name.split(' / ')[1] || ''}</div>
                                                <div className="text-[11px] text-yellow-400/80 font-sans flex items-center gap-1">
                                                    <i className="fa-solid fa-sparkles text-[9px]"></i>
                                                    {topic.sentences.length} Spells / {topic.sentences.length} 句魔法咒語
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="w-full md:w-2/3 flex flex-col gap-2 min-h-0">
                                <div className="flex justify-between items-center shrink-0 px-2">
                                    <h3 className="text-green-400 font-bold text-sm tracking-widest flex items-center gap-2 font-sans">
                                        <i className="fa-solid fa-scroll text-xs"></i> 2. SENTENCES LIST / 句子魔法書
                                    </h3>
                                    <span className="text-magic-accent text-xs font-bold uppercase tracking-widest font-sans">{selectedTopic?.name.split(' / ')[0]}</span>
                                </div>
                                
                                <div className="bg-magic-panel rounded-2xl border border-magic-border flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                    {selectedTopic?.sentences.map((sentence, index) => {
                                        const result = results[selectedTopic.id]?.[sentence.id];
                                        const isPassed = result?.passed;
                                        const score = result?.score;

                                        return (
                                            <div key={sentence.id} className="bg-magic-bg border border-magic-border rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-purple-500/50 transition-all shadow-md">
                                                <div className="flex-grow">
                                                    <div className="text-base text-white font-practice font-medium mb-1">{index + 1}. {sentence.english}</div>
                                                    <div className="text-xs text-purple-300/80">{sentence.chinese}</div>
                                                </div>
                                                
                                                <div className="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-end shrink-0">
                                                    {result ? (
                                                        <span className={`px-2.5 py-1 rounded text-[11px] font-bold tracking-wider font-sans border ${isPassed ? 'bg-emerald-950/40 text-emerald-400 border-emerald-800/40' : 'bg-red-950/40 text-red-400 border-red-800/40'}`}>
                                                            {score}% {isPassed ? 'Passed' : 'Retry'}
                                                        </span>
                                                    ) : (
                                                        <span className="bg-purple-950/40 text-purple-300 border border-purple-800/40 px-2.5 py-1 rounded text-[11px] font-bold tracking-wider font-sans">Pending</span>
                                                    )}
                                                    
                                                    <button 
                                                        onClick={() => onPracticeSentence(selectedTopic, index)}
                                                        className="bg-magic-primary hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors active:scale-95 shadow-md shadow-indigo-500/10"
                                                    >
                                                        Practice / 練習 <i className="fa-solid fa-arrow-right text-[10px]"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PracticeScreen = ({ student, classNum, topic, initialSentenceIndex, onBack, onSaveResult }) => {
            const [currentIndex, setCurrentIndex] = useState(initialSentenceIndex);
            const [isRecording, setIsRecording] = useState(false);
            const [recognizedText, setRecognizedText] = useState('');
            const [currentResult, setCurrentResult] = useState(null);
            const [audioUrl, setAudioUrl] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [showTranslation, setShowTranslation] = useState(false);
            const [toast, setToast] = useState(null);
            
            // Persistent session caches
            const sentenceBlobsRef = useRef({}); 
            const sentenceResultsRef = useRef({}); 
            
            const recognitionRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);
            const synthRef = useRef(window.speechSynthesis);
            const evalTimeoutRef = useRef(null);

            const sentence = topic.sentences[currentIndex];

            // Re-sync states when sentence selection changes
            useEffect(() => {
                if (evalTimeoutRef.current) clearTimeout(evalTimeoutRef.current);
                
                if (mediaRecorderRef.current && mediaRecorderRef.current.state === "recording") {
                    mediaRecorderRef.current.stop();
                }
                if (recognitionRef.current) {
                    recognitionRef.current.stop();
                }

                setIsRecording(false);
                setRecognizedText('');
                
                const activeSentence = topic.sentences[currentIndex];
                const savedResult = sentenceResultsRef.current[activeSentence.id] || null;
                const savedBlob = sentenceBlobsRef.current[activeSentence.id] || null;

                setCurrentResult(savedResult);
                if (savedResult) {
                    setRecognizedText(savedResult.recognizedText || '');
                }
                
                if (savedBlob) {
                    setAudioUrl(URL.createObjectURL(savedBlob));
                } else {
                    setAudioUrl(null);
                }

                setIsUploading(false);
                setShowTranslation(false);
            }, [currentIndex]);

            useEffect(() => {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onresult = (event) => {
                        let finalTranscript = '';
                        let interimTranscript = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            if (event.results[i].isFinal) {
                                finalTranscript += event.results[i][0].transcript;
                            } else {
                                interimTranscript += event.results[i][0].transcript;
                            }
                        }
                        setRecognizedText(finalTranscript || interimTranscript);
                    };

                    recognitionRef.current.onerror = (event) => {
                        console.error("Speech recognition error", event.error);
                        stopRecordingProcess();
                    };
                }
                return () => {
                    if (evalTimeoutRef.current) clearTimeout(evalTimeoutRef.current);
                    if (recognitionRef.current) recognitionRef.current.stop();
                };
            }, [sentence.english]);

            const startRecordingProcess = async () => {
                try {
                    const activeSentence = topic.sentences[currentIndex];
                    setRecognizedText('');
                    setCurrentResult(null);
                    setAudioUrl(null);
                    
                    delete sentenceBlobsRef.current[activeSentence.id];
                    delete sentenceResultsRef.current[activeSentence.id];
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    audioChunksRef.current = [];

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) audioChunksRef.current.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        
                        sentenceBlobsRef.current[activeSentence.id] = blob;
                        setAudioUrl(url);
                        
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    if (recognitionRef.current) recognitionRef.current.start();
                    setIsRecording(true);
                } catch (err) {
                    setToast({ message: "Unable to access microphone! / 無法取用麥克風", type: "error" });
                }
            };

            const stopRecordingProcess = () => {
                return new Promise((resolve) => {
                    if (mediaRecorderRef.current && mediaRecorderRef.current.state === "recording") {
                        mediaRecorderRef.current.onstop = () => {
                            const blob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                            const url = URL.createObjectURL(blob);
                            
                            const activeSentence = topic.sentences[currentIndex];
                            sentenceBlobsRef.current[activeSentence.id] = blob;
                            setAudioUrl(url);
                            
                            if (mediaRecorderRef.current.stream) {
                                mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
                            }
                            resolve(blob);
                        };
                        mediaRecorderRef.current.stop();
                    } else {
                        resolve(null);
                    }
                    
                    if (recognitionRef.current) {
                        recognitionRef.current.stop();
                    }
                    setIsRecording(false);
                    
                    if (evalTimeoutRef.current) clearTimeout(evalTimeoutRef.current);
                    evalTimeoutRef.current = setTimeout(() => {
                        setRecognizedText(prevText => {
                            const activeSentence = topic.sentences[currentIndex];
                            let result;
                            if (prevText.trim()) {
                                result = evaluatePronunciation(activeSentence.english, prevText);
                            } else {
                                result = { score: 0, wordStatus: activeSentence.english.split(' ').map(w => ({word: w, correct: false})), passed: false, error: "No voice detected" };
                            }
                            result.recognizedText = prevText;
                            
                            sentenceResultsRef.current[activeSentence.id] = result;
                            setCurrentResult(result);
                            onSaveResult(topic.id, activeSentence.id, result);
                            
                            return prevText;
                        });
                    }, 500);
                });
            };

            const toggleRecording = async () => {
                if (isRecording) await stopRecordingProcess();
                else startRecordingProcess();
            };

            const playTTS = (rate = 1.0) => {
                if (synthRef.current.speaking) synthRef.current.cancel();
                const utterance = new SpeechSynthesisUtterance(sentence.english);
                utterance.lang = 'en-US';
                utterance.rate = rate;
                synthRef.current.speak(utterance);
            };

            const playWordTTS = (word) => {
                if (synthRef.current.speaking) synthRef.current.cancel();
                const clean = word.replace(/[.,?!'"]/g, '');
                const utterance = new SpeechSynthesisUtterance(clean);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                synthRef.current.speak(utterance);
            };

            const playUserAudio = () => {
                if (audioUrl) {
                    const audio = new Audio(audioUrl);
                    audio.play();
                }
            };

            const handleFinish = async () => {
                setIsUploading(true);

                // Stop active voice track if still running
                if (isRecording) {
                    await stopRecordingProcess();
                }

                const orderedBlobs = [];
                let totalScore = 0;
                let scoredSentencesCount = 0;

                topic.sentences.forEach(s => {
                    const blob = sentenceBlobsRef.current[s.id];
                    const result = sentenceResultsRef.current[s.id];
                    if (blob) {
                        orderedBlobs.push(blob);
                    }
                    if (result) {
                        totalScore += result.score;
                        scoredSentencesCount++;
                    }
                });

                const averageScore = scoredSentencesCount > 0 ? Math.round(totalScore / scoredSentencesCount) : 0;

                if (orderedBlobs.length === 0) {
                    setToast({ message: "No recorded sentences found! Please practice before uploading.", type: "error" });
                    setIsUploading(false);
                    return;
                }

                try {
                    // Stitches all recorded segments cleanly using Web Audio API decoding and converts directly to standard playable WAV!
                    const combinedWavBlob = await mergeAudioBlobsToWav(orderedBlobs);
                    if (!combinedWavBlob) {
                        setToast({ message: "Audio rendering failed. Please try recording again.", type: "error" });
                        setIsUploading(false);
                        return;
                    }

                    const reader = new FileReader();
                    reader.readAsDataURL(combinedWavBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        const dateFormatted = new Date().toISOString().split('T')[0];
                        const fileName = `${classNum}A_${student.name}_${dateFormatted}.wav`;

                        const payload = {
                            sheetUrl: GOOGLE_SHEET_URL,
                            folderId: GOOGLE_DRIVE_FOLDER_ID,
                            className: classNum,
                            studentName: student.name,
                            topicName: topic.name,
                            score: averageScore,
                            audioBase64: base64Audio,
                            fileName
                        };

                        try {
                            const response = await fetch(GOOGLE_SCRIPT_URL, {
                                method: 'POST',
                                mode: 'cors',
                                headers: { 'Content-Type': 'text/plain' },
                                body: JSON.stringify(payload)
                            });

                            const resData = await response.json();
                            if (resData.status === "success") {
                                setToast({ message: `Successfully saved! Avg Score: ${averageScore}% 傳送成功！`, type: "success" });
                            } else {
                                setToast({ message: `Config error: ${resData.message}`, type: "error" });
                            }
                        } catch (err) {
                            setToast({ message: "Network connection failed. Saved locally! 網路連線失敗，已存入瀏覽器快取！", type: "error" });
                        } finally {
                            setIsUploading(false);
                            setTimeout(onBack, 3000);
                        }
                    };
                } catch (e) {
                    console.error("Assembly error", e);
                    setToast({ message: "Error compiling audio file segments.", type: "error" });
                    setIsUploading(false);
                }
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <MagicalHeader onBackToMainMenu={onBack} />
                    
                    <div className="flex-grow p-4 max-w-5xl mx-auto w-full flex flex-col min-h-0 select-none">
                        
                        <div className="flex justify-between items-center mb-4 shrink-0">
                            <button onClick={onBack} className="text-purple-300 hover:text-white flex items-center gap-1.5 text-xs font-sans">
                                <i className="fa-solid fa-arrow-left"></i> Back to list / 返回清單
                            </button>
                            <div className="text-magic-accent font-bold text-xs uppercase tracking-widest font-sans">
                                {topic.name} ({currentIndex + 1} / {topic.sentences.length})
                            </div>
                        </div>

                        <div className="glass-panel flex-grow rounded-2xl p-6 flex flex-col items-center justify-center relative overflow-y-auto">
                            
                            <div className="text-center w-full max-w-3xl mb-6">
                                <h2 className="font-practice text-3xl sm:text-4xl md:text-5xl text-white mb-4 leading-tight flex flex-wrap justify-center gap-x-2 gap-y-3 font-semibold">
                                    {currentResult ? (
                                        currentResult.wordStatus.map((w, i) => (
                                            <span 
                                                key={i} 
                                                onClick={() => playWordTTS(w.word)} 
                                                className={`cursor-pointer hover:scale-110 active:scale-95 transition-transform ${w.correct ? 'word-correct' : 'word-incorrect'}`} 
                                                title="Click to hear word pronunciation"
                                            >
                                                {w.word}
                                            </span>
                                        ))
                                    ) : (
                                        sentence.english.split(' ').map((word, i) => (
                                            <span 
                                                key={i} 
                                                onClick={() => playWordTTS(word)} 
                                                className="cursor-pointer hover:text-magic-accent hover:scale-110 active:scale-95 transition-transform inline-block" 
                                                title="Click to hear word pronunciation"
                                            >
                                                {word}
                                            </span>
                                        ))
                                    )}
                                </h2>

                                <div className="min-h-[36px] flex items-center justify-center">
                                    {showTranslation ? (
                                        <p className="text-lg text-purple-300 font-sans transition-all animate-fade-in">{sentence.chinese}</p>
                                    ) : (
                                        <button 
                                            onClick={() => setShowTranslation(true)}
                                            className="text-xs text-purple-400 hover:text-purple-300 border border-purple-800/40 bg-purple-950/20 px-3 py-1.5 rounded-full font-sans transition-all"
                                        >
                                            <i className="fa-solid fa-eye mr-1"></i> Show Translation / 顯示中文翻譯
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="w-full max-w-xl bg-black/45 rounded-xl min-h-[90px] p-4 mb-6 flex flex-col items-center justify-center border border-purple-900/40 relative">
                                {currentResult ? (
                                    <div className="text-center flex flex-col items-center animate-fade-in">
                                        <span className="text-[10px] text-purple-300/80 tracking-wider uppercase font-sans">Final Accuracy Score</span>
                                        <div className={`text-5xl font-bold ${currentResult.passed ? 'text-blue-400' : 'text-red-400'} drop-shadow mb-1`}>
                                            {currentResult.score}%
                                        </div>
                                        <p className="text-gray-300 italic text-sm">"{recognizedText}"</p>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <span className="text-[10px] text-purple-400 tracking-wider uppercase font-sans">Voice Recognition</span>
                                        <p className="text-base text-blue-200 italic min-h-[24px] font-practice mt-1">{recognizedText || (isRecording ? "Listening..." : "Waiting for mic...")}</p>
                                    </div>
                                )}
                            </div>

                            <div className="flex flex-wrap items-center justify-center gap-4 sm:gap-6 mb-6 w-full max-w-xl shrink-0">
                                <div className="flex gap-2">
                                    <button 
                                        onClick={() => playTTS(1.0)} 
                                        className="w-14 h-14 rounded-full bg-magic-card hover:bg-purple-950 border border-magic-border flex flex-col items-center justify-center text-purple-300 hover:text-white hover:border-purple-400 transition-all active:scale-90 shadow-md"
                                        title="Hear native audio at normal speed"
                                    >
                                        <i className="fa-solid fa-volume-high text-lg"></i>
                                        <span className="text-[9px] uppercase font-bold tracking-wider mt-0.5 font-sans">1.0x</span>
                                    </button>
                                    <button 
                                        onClick={() => playTTS(0.6)} 
                                        className="w-14 h-14 rounded-full bg-magic-card hover:bg-purple-950 border border-magic-border flex flex-col items-center justify-center text-purple-300 hover:text-white hover:border-purple-400 transition-all active:scale-90 shadow-md"
                                        title="Hear slow pronunciation instruction"
                                    >
                                        <i className="fa-solid fa-volume-low text-lg"></i>
                                        <span className="text-[9px] uppercase font-bold tracking-wider mt-0.5 font-sans">0.6x</span>
                                    </button>
                                </div>

                                <button 
                                    onClick={() => setShowTranslation(!showTranslation)}
                                    className={`px-4 h-14 rounded-full border flex items-center gap-2 transition-all active:scale-90 text-xs font-bold font-sans ${showTranslation ? 'bg-yellow-500/20 text-yellow-300 border-yellow-500/40' : 'bg-magic-card text-purple-300 border-magic-border hover:border-purple-400'}`}
                                >
                                    <i className="fa-solid fa-language text-lg"></i>
                                    <span>{showTranslation ? "Hide 中文" : "Show 中文"}</span>
                                </button>

                                <button 
                                    onClick={toggleRecording}
                                    className={`w-20 h-20 rounded-full flex flex-col items-center justify-center transition-all ${isRecording ? 'bg-red-500 text-white animate-record' : 'bg-magic-primary text-white hover:bg-indigo-500 hover:scale-105 shadow-indigo-500/30'}`}
                                >
                                    <i className={`fa-solid ${isRecording ? 'fa-stop' : 'fa-microphone'} text-2xl`}></i>
                                    <span className="text-[10px] font-bold mt-1 uppercase tracking-widest font-sans">{isRecording ? 'Stop' : 'Speak'}</span>
                                </button>
                                
                                <div className="flex gap-2 min-w-[56px]">
                                    {audioUrl && (
                                        <button 
                                            onClick={playUserAudio} 
                                            className="w-14 h-14 rounded-full bg-indigo-950 hover:bg-indigo-900 border border-indigo-500/50 flex flex-col items-center justify-center text-yellow-300 transition-all active:scale-90 shadow-lg"
                                        >
                                            <i className="fa-solid fa-play text-lg animate-pulse"></i>
                                            <span className="text-[8px] uppercase font-bold tracking-wider mt-0.5 font-sans">Listen Voice</span>
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="w-full flex justify-between mt-auto px-4 max-w-3xl shrink-0">
                                <button 
                                    onClick={() => setCurrentIndex(i => Math.max(0, i - 1))}
                                    disabled={currentIndex === 0 || isUploading}
                                    className={`px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 text-xs font-sans ${currentIndex === 0 ? 'text-gray-600 cursor-not-allowed' : 'text-purple-300 hover:text-white bg-white/5 hover:bg-white/10'}`}
                                >
                                    <i className="fa-solid fa-angle-left"></i> Prev
                                </button>
                                
                                <button 
                                    disabled={isUploading}
                                    onClick={() => {
                                        if (currentIndex < topic.sentences.length - 1) setCurrentIndex(i => i + 1);
                                        else handleFinish();
                                    }}
                                    className={`px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 text-xs text-magic-accent border font-sans ${isUploading ? 'bg-purple-900/50 border-purple-500/30 cursor-not-allowed' : 'bg-yellow-500/10 hover:bg-yellow-500/20 border-yellow-500/30'}`}
                                >
                                    {isUploading ? (
                                        <><i className="fa-solid fa-spinner fa-spin"></i> Uploading...</>
                                    ) : currentIndex < topic.sentences.length - 1 ? (
                                        <>Next <i className="fa-solid fa-angle-right"></i></>
                                    ) : (
                                        <>Finish & Upload / 提交並上傳 <i className="fa-solid fa-cloud-arrow-up animate-pulse"></i></>
                                    )}
                                </button>
                            </div>
                        </div>
                    </div>

                    {toast && <MagicToast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                </div>
            );
        };

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('splash'); 
            const [selectedClass, setSelectedClass] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const [practiceTopic, setPracticeTopic] = useState(null);
            const [practiceStartIndex, setPracticeStartIndex] = useState(0);

            const [topics] = useState(ASSIGNED_TOPICS);
            const [results, setResults] = useState({});

            const handleSaveResult = (topicId, sentenceId, resultData) => {
                setResults(prev => ({
                    ...prev,
                    [topicId]: {
                        ...(prev[topicId] || {}),
                        [sentenceId]: resultData
                    }
                }));
            };

            return (
                <div className="font-sans app-content">
                    {currentScreen === 'splash' && <SplashScreen onEnter={() => setCurrentScreen('class')} />}
                    {currentScreen === 'class' && (
                        <ClassSelection 
                            onSelectClass={(cls) => { setSelectedClass(cls); setCurrentScreen('student'); }} 
                        />
                    )}
                    {currentScreen === 'student' && (
                        <StudentSelection 
                            classNum={selectedClass} 
                            onSelectStudent={(s) => { setSelectedStudent(s); setCurrentScreen('dashboard'); }} 
                            onBack={() => setCurrentScreen('class')} 
                        />
                    )}
                    
                    {currentScreen === 'dashboard' && (
                        <Dashboard 
                            student={selectedStudent} 
                            classNum={selectedClass} 
                            topics={topics}
                            results={results}
                            onExit={() => { setSelectedStudent(null); setCurrentScreen('class'); }}
                            onPracticeSentence={(topic, index) => {
                                setPracticeTopic(topic);
                                setPracticeStartIndex(index);
                                setCurrentScreen('practice');
                            }}
                        />
                    )}

                    {currentScreen === 'practice' && (
                        <PracticeScreen 
                            student={selectedStudent}
                            classNum={selectedClass}
                            topic={practiceTopic}
                            initialSentenceIndex={practiceStartIndex}
                            onBack={() => setCurrentScreen('dashboard')}
                            onSaveResult={handleSaveResult}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <>
                <div className="landscape-warning fixed inset-0 z-50 bg-magic-bg flex-col items-center justify-center p-8 text-center hidden">
                    <i className="fa-solid fa-rotate text-6xl text-magic-accent mb-6 animate-pulse"></i>
                    <h2 className="text-2xl font-bold text-white mb-2">Please Rotate Your Device</h2>
                    <p className="text-purple-300">This language lab is optimized for landscape mode.<br/>請將設備旋轉為橫向以獲得最佳體驗。</p>
                </div>
                <App />
            </>
        );
    </script>
</body>
</html>
